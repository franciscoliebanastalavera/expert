<div
  [ngClass]="{
    'modal-close': !showModal(),
    'modal-open': showModal(),
    'modal-transition': true,
  }"
>
  @if (showModal()) {
    <div
      id="modal-back"
      class="modal-back"
      (keydown)="onKeyDown($event)"
      (click)="onExit($event)"
    >
      <div
        [class]="'box-modal-' + size()"
        class="box-modal"
        [ngClass]="{
          'box-modal-responsive': !tooltipModal(),
        }"
      >
        @if (!bgBlocked()) {
          <div class="modal-icon-close" (click)="close()">
            <img src="images/icon-close-reb.svg" alt="cerrar" />
          </div>
        }
        @if (!isActiveNgContent()) {
          <div>
            <p class="modal-title">{{ title() }}</p>
            @if (image()) {
              <div class="modal-img-content">
                <div class="modal-img-content-box">
                  <img [src]="imageUrl()" alt="image" />
                </div>
              </div>
            }
            <p class="modal-text">{{ text() }}</p>
            @if (showPrimaryButton() || showSecondaryButton()) {
              <div
                [ngClass]="{
                  'modal-buttons-content-one-button':
                    (showPrimaryButton() && !showSecondaryButton()) ||
                    (!showPrimaryButton() && showSecondaryButton()),
                  'modal-buttons-content-two-buttons': showPrimaryButton() && showSecondaryButton(),
                }"
              >
                @if (showSecondaryButton()) {
                  <div class="modal-buttons-content-box-primary">
                    <cap-button
                      variant="tertiary"
                      size="small"
                      [width]="size() === 'small' ? '100%' : 'auto'"
                      [label]="labelSecondaryButton()"
                      textStyle="none"
                      (nterClick)="close()"
                    ></cap-button>
                  </div>
                }
                @if (showPrimaryButton()) {
                  <div class="modal-buttons-content-box-secondary">
                    <cap-button
                      variant="primary"
                      size="small"
                      [width]="size() === 'small' ? '100%' : 'auto'"
                      [label]="labelPrimaryButton()"
                      textStyle="none"
                      (nterClick)="handlePrimaryButtonClick()"
                    ></cap-button>
                  </div>
                }
              </div>
            }
          </div>
        } @else {
          <div class="ng-content">
            <ng-content></ng-content>
          </div>
        }
      </div>
    </div>
  }
</div>

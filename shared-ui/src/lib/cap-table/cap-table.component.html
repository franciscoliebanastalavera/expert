<div class="cap-table__wrapper">
  <table class="cap-table">
    <thead class="cap-table__head">
      <tr>
        @for (col of columns(); track col.key) {
          <th
            class="cap-table__th"
            [ngClass]="col.cssClass || null"
          >
            {{ col.label }}
          </th>
        }
      </tr>
    </thead>
    <tbody class="cap-table__body">
      @for (row of data(); track trackByRow($index, row)) {
        <tr class="cap-table__row">
          @for (col of columns(); track col.key) {
            <td
              class="cap-table__td"
              [ngClass]="col.cssClass || null"
            >
              @if (templateFor(col.key); as cellTpl) {
                <ng-container
                  [ngTemplateOutlet]="cellTpl"
                  [ngTemplateOutletContext]="{ $implicit: getCellValue(row, col.key), row: row, column: col }"
                ></ng-container>
              } @else {
                {{ getCellValue(row, col.key) }}
              }
            </td>
          }
        </tr>
      }
    </tbody>
  </table>
</div>

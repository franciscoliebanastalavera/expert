<div class="cap-spinner" [class]="'cap-spinner--' + size()" role="status" aria-live="polite">
  <svg class="cap-spinner__svg" focusable="false" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
  </svg>
  @if (label()) {
    <span class="cap-spinner__label">{{ label() }}</span>
  }
</div>

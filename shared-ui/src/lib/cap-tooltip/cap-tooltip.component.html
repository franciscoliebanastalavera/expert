<div class="cap-tooltip">
  @if (!showTablet || !enableTooltipModal()) {
    <div
      class="cap-tooltip__desktop"
      [ngClass]="{ 'cap-tooltip__desktop__vertical-invert': invertVertical() }"
    >
      <div
        class="cap-tooltip__desktop__box"
        [class]="'cap-tooltip__desktop__box-' + tooltipAlign()"
        [ngStyle]="{
          visibility: showTooltip ? 'visible' : 'hidden',
        }"
      >
        @if (titleTooltip()) {
          <p class="title" [innerHTML]="titleTooltip()"></p>
        }
        <p [innerHTML]="textTooltip()"></p>
      </div>
      <div
        class="cap-tooltip__desktop__triangle"
        [ngStyle]="{ visibility: showTooltip ? 'visible' : 'hidden' }"
      ></div>
      <div class="icon" (mouseenter)="hoverIcon(true)" (mouseleave)="hoverIcon(false)">
        <img src="images/info-reb.svg" alt="" />
      </div>
    </div>
  }
  @if (showTablet && enableTooltipModal()) {
    <div>
      <div class="icon" (click)="openModalTooltip(true)">
        <img src="images/info-reb.svg" alt="" />
      </div>
      <cap-modal
        size="small"
        [showModal]="showModalTooltip"
        [isActiveNgContent]="true"
        [tooltipModal]="true"
        (closeModal)="openModalTooltip(false)"
      >
        <div class="container__modal">
          @if (titleTooltip()) {
            <p class="title__modal" [innerHTML]="titleTooltip()"></p>
          }
          <p class="text" [innerHTML]="textTooltip()"></p>
        </div>
      </cap-modal>
    </div>
  }
</div>

<button
    [type]="type"
    [disabled]="disabled"
    [class]="icon && (iconVariants ? (iconVariants | includes: variant) : false) && (notLabelVariants ? !(notLabelVariants | includes: variant) : true) ? 'cap-button__icon-' + (iconOrientation ? iconOrientation.toString() : '') : ''"
    [ngClass]="buttonClasses"
    [style.width]="width"
    [style.min-width]="minWidth"
    [attr.aria-label]="ariaLabel || label"
    [attr.aria-describedby]="ariaDescribedBy"
    [attr.aria-pressed]="selected"
    [attr.aria-busy]="loading"
    [tabIndex]="tabIndex"
    (click)="handleButton()"
>
    @if (loading) {
        <span class="cap-button__spinner" aria-hidden="true"></span>
        @if (loadingText) {
            <span class="cap-button__loading-text">{{ loadingText }}</span>
        }
    } @else {
        @if (icon && iconVariants | includes: variant) {
            <img class="cap-button__icon" [src]="icon" alt="Button icon" />
        }
        @if (!(notLabelVariants | includes: variant)) {
            <span [class]="'cap-button__label-' + textStyle">
                {{ label }}
            </span>
        }
    }
</button>

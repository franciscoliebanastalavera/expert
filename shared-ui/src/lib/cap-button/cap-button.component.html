<button
    [type]="type"
    [disabled]="disabled"
    [ngClass]="buttonClasses"
    [class]="iconClass"
    [style.width]="width"
    [style.min-width]="minWidth"
    [attr.aria-label]="ariaLabel || label"
    [attr.aria-describedby]="ariaDescribedBy"
    [attr.aria-pressed]="selected"
    [attr.aria-busy]="loading"
    [tabIndex]="tabIndex"
    (click)="handleButton()"
>
    <ng-container *ngIf="loading; else content">
        <span class="cap-button__spinner" aria-hidden="true"></span>
        <span *ngIf="loadingText" class="cap-button__loading-text">{{ loadingText }}</span>
    </ng-container>
    <ng-template #content>
        <img *ngIf="showIcon" class="cap-button__icon" [src]="icon" alt="" />
        <span *ngIf="showLabel" [class]="'cap-button__label-' + textStyle">{{ label }}</span>
    </ng-template>
</button>

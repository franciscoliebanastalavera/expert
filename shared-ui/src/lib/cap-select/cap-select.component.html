<!-- 'clickedOutside' es una directiva a la que nos suscribimos para saber si en algun momento se hace click fuera del selector y cerrar el dropdown. -->
<div
  appClickOutside
  (clickedOutside)="clickOutside()"
  [class]="'cap-select__field cap-select__field-' + size"
  [ngClass]="{
    'cap-select__field-disabled': disabled,
    'cap-select__field-unfold': unfold,
    'cap-select__field-invalid': control?.valid === false && control?.touched,
  }"
>
  <div class="controls">
    <input
      #selector
      [id]="name"
      [type]="type"
      [ngModel]="getValueLabel()"
      (ngModelChange)="controlInputValue($event)"
      [disabled]="disabled"
      [placeholder]="placeholderSelector()"
      [attr.focus]="fieldOnFocus"
      [readonly]="predictiveType === 'none'"
      spellcheck="false"
      autocomplete="off"
      (input)="handleSelector(selector.value)"
      (focus)="handleFocus()"
      (blur)="handleBlur($event)"
      (keyup)="filterOptions($event, selector.value)"
    />
    <label
      *ngIf="label"
      [for]="name"
      [class]="'cap-select__label cap-select__label-' + size"
      [ngClass]="{
        'cap-select__label-floating': fieldOnFocus || !!value,
        'cap-select__label-invalid': control?.valid === false && control?.touched,
      }"
    >
      {{ label }}
    </label>
    <div
      class="cap-select__buttons"
      [ngClass]="{
        'cap-select__buttons-small': size === 'small',
      }"
    >
      <cap-button
        *ngIf="!!value && fieldOnFocus && predictiveType !== 'none' && unfold"
        variant="icon-button"
        [inputButton]="true"
        size="small"
        icon="images/circle-cross-reb.svg"
        (click)="handleClear()"
      ></cap-button>
      <cap-button
        variant="icon-button"
        [inputButton]="true"
        size="small"
        icon="images/icon-arrows-select-reb.svg"
        (click)="handleUnfold()"
      ></cap-button>
    </div>
  </div>
  <div
    id="dropdown"
    *ngIf="unfold"
    class="cap-select__dropdown"
    [ngClass]="{
      'cap-select__dropdown-auto': displayOptions?.length < dropdownSize,
      'cap-select__dropdown-small': size === 'small',
      'cap-select__dropdown-short': shortDropdown && !description,
      'cap-select__dropdown-description': description && !shortDropdown,
      'cap-select__dropdown-description-short': description && shortDropdown,
    }"
  >
    <div *ngIf="displayOptions?.length !== 0">
      <div
        class="options"
        *ngFor="let option of displayOptions"
        [id]="option.checked ? 'checked' : 'noChecked'"
      >
        <div class="divider-option"></div>
        <label
          class="option"
          [ngClass]="{
            'option-disabled': option.disabled,
            'option-selected': option.checked,
          }"
        >
          <div class="label">
            {{ option.label }}
          </div>
          <input
            type="checkbox"
            [checked]="option.checked"
            [disabled]="option.disabled"
            (change)="selectOption($event, option)"
          />
          <span class="checker">
            <img *ngIf="option.checked" src="images/check.svg" alt="" />
          </span>
          <div
            *ngIf="description && option.value !== 'todos' && option.value !== 'todas'"
            class="description"
          >
            <p>{{ option.description }}</p>
          </div>
        </label>
      </div>
    </div>
    <div *ngIf="displayOptions?.length === 0" class="cap-select__dropdown-no-results">
      <div class="divider-option"></div>
      <p>No hay resultados coincidentes.</p>
    </div>
  </div>
</div>
<div class="cap-select__helpers">
  <span *ngIf="helper && (control?.valid !== false || !control?.touched)">
    {{ helper }}
  </span>
  <span
    *ngIf="control?.valid === false && control?.touched"
    class="cap-select__helpers-error"
  >
    <ng-container
      [ngTemplateOutlet]="!!errorMessages ? customError : helperError"
    ></ng-container>
    <ng-template #helperError>
      <span>{{ helper }}</span>
    </ng-template>
    <ng-template #customError>
      <span *ngFor="let error of control?.errors | keyvalue">
        {{ errorMessages[error.key] }}
      </span>
    </ng-template>
  </span>
</div>

<label
  *ngIf="label"
  [for]="controlId"
  class="cap-switch__label"
  [ngClass]="{ 'cap-switch__disabled': disabled }"
  [ngStyle]="{
    color: labelColor === 'black' ? 'inherit' : 'white',
    fontFamily: labelWeight === 'normal' ? 'inherit' : 'SenticoSansDT-Medium',
  }"
>
  {{ label }}
</label>
<input
  #switch
  type="checkbox"
  [id]="controlId"
  class="cap-switch__input"
  [checked]="checked"
  [disabled]="disabled"
  (change)="handleChange(switch.checked)"
/>
<label [for]="controlId" class="cap-switch__control"></label>

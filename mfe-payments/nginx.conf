server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        # Local docker-compose CORS scope. In production, use $cors_origin variable per environment.
        add_header Access-Control-Allow-Origin "http://localhost:8081" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;

        try_files $uri $uri/ /index.html;
    }

    location = /remoteEntry.js {
        # Local docker-compose CORS scope. In production, use $cors_origin variable per environment.
        add_header Access-Control-Allow-Origin "http://localhost:8081" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
        add_header Cache-Control "no-store" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    location ~* \.(?:css|map|jpe?g|png|gif|ico|svg|woff2?|ttf|eot)$ {
        # Local docker-compose CORS scope. In production, use $cors_origin variable per environment.
        add_header Access-Control-Allow-Origin "http://localhost:8081" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.js$ {
        # Local docker-compose CORS scope. In production, use $cors_origin variable per environment.
        add_header Access-Control-Allow-Origin "http://localhost:8081" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

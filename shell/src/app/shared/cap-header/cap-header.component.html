<header class="cap-header">
  <a class="cap-header__brand" routerLink="/">
    @if (!brandIcon()) {
      <svg class="cap-header__logo" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#fff" fill-opacity="0.15"/>
        <path d="M10 16.5l3-3 2 2 4-4 3 3" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    } @else {
      <img class="cap-header__logo" [src]="brandIcon()" [alt]="brandName()" />
    }
    <span class="cap-header__title">{{ brandName() }}</span>
  </a>

  <button class="cap-header__hamburger" (click)="toggleMenu()" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <nav class="cap-header__nav" [class.cap-header__nav--open]="menuOpen">
    @for (item of navItems(); track item.route) {
      <a class="cap-header__link"
         [routerLink]="item.route"
         routerLinkActive="cap-header__link--active"
         [routerLinkActiveOptions]="{ exact: isActiveRouteExact(item.route) }"
         (click)="closeMenu()">
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="cap-header__actions" [class.cap-header__actions--open]="menuOpen">
    @if (showThemeToggle()) {
      <button class="cap-header__btn" (click)="themeToggle.emit()" [attr.aria-label]="isDark() ? 'Light mode' : 'Dark mode'">
        @if (isDark()) {
          <svg class="cap-header__icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
          </svg>
        } @else {
          <svg class="cap-header__icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
        }
      </button>
    }
    @if (showLangSelector()) {
      <button class="cap-header__lang" (click)="onLangChange()" aria-label="Change language">
        {{ currentLang() === appLanguage.Es ? 'EN' : 'ES' }}
      </button>
    }
  </div>
</header>

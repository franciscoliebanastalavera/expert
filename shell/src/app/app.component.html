<div class="capitalflow-theme">
  <cap-header
    brandName="CapitalFlow"
    [navItems]="navItems"
    [isDark]="themeService.isDark()"
    [currentLang]="idiomaActual"
    (themeToggle)="themeService.toggle()"
    (langChange)="cambiarIdioma()">
  </cap-header>

  <main class="main">
    <router-outlet></router-outlet>
  </main>

  <footer class="footer">
    <span>{{ 'FOOTER.COPYRIGHT' | translate }}</span>
  </footer>
</div>

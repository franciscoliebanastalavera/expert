<div class="capitalflow-theme">
  <cap-header
    brandName="CapitalFlow"
    [navItems]="navItems()"
    [isDark]="themeService.isDark()"
    [currentLang]="idiomaActual()"
    (themeToggle)="themeService.toggle()"
    (langChange)="cambiarIdioma($event)">
  </cap-header>

  <main class="main">
    <router-outlet></router-outlet>
  </main>

  <cap-footer [copyrightText]="'FOOTER.COPYRIGHT' | translate"></cap-footer>
</div>

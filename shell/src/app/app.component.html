<!-- Contenedor raíz con el tema CapitalFlow aplicado -->
<div class="capitalflow-theme">
  <nav class="navbar">
    <a class="brand" routerLink="/">
      <span class="brand-icon">💰</span>
      {{ 'NAV.BRAND' | translate }}
    </a>
    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        {{ 'NAV.HOME' | translate }}
      </a>
      <a routerLink="/analytics" routerLinkActive="active">
        {{ 'NAV.ANALYTICS' | translate }}
      </a>
    </div>
    <div class="nav-actions">
      <!-- Toggle de tema claro/oscuro -->
      <button class="icon-btn" (click)="themeService.toggle()"
        [title]="(themeService.theme$ | async) === 'dark' ? ('NAV.THEME_LIGHT' | translate) : ('NAV.THEME_DARK' | translate)">
        {{ (themeService.theme$ | async) === 'dark' ? '☀️' : '🌙' }}
      </button>
      <!-- Selector de idioma -->
      <button class="lang-btn" (click)="cambiarIdioma()">
        {{ idiomaActual === 'es' ? 'EN' : 'ES' }}
      </button>
    </div>
  </nav>
  <main>
    <router-outlet></router-outlet>
  </main>
</div>

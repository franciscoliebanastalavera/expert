<div #container class="mfe-container">
  @if (cargando()) {
    <div class="spinner-wrapper" [class.fade-out]="fadeOut()">
      <cap-spinner [label]="'MFE.LOADING' | translate" />
      @if (attemptedUrl()) {
        <p class="mfe-container__remote-url">
          {{ 'MFE.LOADING_FROM' | translate }} <code>{{ attemptedUrl() }}</code>
        </p>
      }
    </div>
  }
  @if (loadError()) {
    <cap-alert kind="danger" [message]="loadError() ?? ''">
      <cap-button
        variant="capitalflow-outline"
        size="small"
        textStyle="none"
        [label]="'MFE.RETRY' | translate"
        (capClick)="retryLoad()">
      </cap-button>
    </cap-alert>
  }
</div>

<section class="search-demo">
  <h1>{{ i18n.PAGE_TITLE | translate }}</h1>
  <p class="search-demo__lead">{{ i18n.PAGE_LEAD | translate }}</p>

  <form class="search-demo__form" (submit)="search(); $event.preventDefault()">
    <label class="search-demo__field">
      <span class="search-demo__field-label">{{ i18n.FIELD_LABEL | translate }}</span>
      <input type="text" [formControl]="queryControl" autocomplete="off" class="search-demo__input" [attr.aria-describedby]="'search-hint'" />
      <small id="search-hint" class="search-demo__hint">{{ i18n.FIELD_HINT | translate }}</small>
    </label>
    <cap-button
      variant="capitalflow-primary"
      size="small"
      textStyle="none"
      type="submit"
      [label]="i18n.SEARCH_BUTTON | translate"
      (capClick)="search()">
    </cap-button>
  </form>

  @if (query()) {
    <h2 class="search-demo__heading">{{ i18n.RESULTS_PREFIX | translate }} <span [innerText]="query()"></span></h2>
    <cap-alert kind="success" [message]="i18n.NOTE | translate"></cap-alert>
  }

  <footer class="search-demo__footer">
    <cap-button
      variant="capitalflow-outline"
      size="small"
      textStyle="none"
      [label]="'← ' + (i18n.BACK | translate)"
      (capClick)="goBack()">
    </cap-button>
  </footer>
</section>

<section class="analytics">
  <div class="analytics-header">
    <div>
      <h1>{{ 'ANALYTICS.TITLE' | translate }}</h1>
      <p class="subtitle">{{ numTransacciones }} {{ 'ANALYTICS.SUBTITLE_SUFFIX' | translate }}</p>
    </div>
    <button class="btn btn-outline" routerLink="/">
      {{ 'ANALYTICS.BTN_BACK' | translate }}
    </button>
  </div>

  <app-analytics-stats
    [total]="numTransacciones"
    [income]="totalIngresos"
    [expenses]="totalGastos">
  </app-analytics-stats>

  <div class="filtros">
    <div class="filtro-grupo">
      <label>{{ 'ANALYTICS.FILTERS.SEARCH' | translate }}</label>
      <input
        type="text"
        [(ngModel)]="filtroTexto"
        (ngModelChange)="aplicarFiltros()"
        [placeholder]="'ANALYTICS.FILTERS.SEARCH_PLACEHOLDER' | translate"
        class="filtro-input"
      />
    </div>
    <div class="filtro-grupo">
      <label>{{ 'ANALYTICS.FILTERS.AMOUNT_MIN' | translate }}</label>
      <input
        type="number"
        [(ngModel)]="filtroImporteMin"
        (ngModelChange)="aplicarFiltros()"
        placeholder="€ Min"
        class="filtro-input filtro-num"
      />
    </div>
    <div class="filtro-grupo">
      <label>{{ 'ANALYTICS.FILTERS.AMOUNT_MAX' | translate }}</label>
      <input
        type="number"
        [(ngModel)]="filtroImporteMax"
        (ngModelChange)="aplicarFiltros()"
        placeholder="€ Max"
        class="filtro-input filtro-num"
      />
    </div>
    <button class="btn btn-sm" (click)="limpiarFiltros()">{{ 'ANALYTICS.FILTERS.CLEAR' | translate }}</button>
    <button class="btn btn-primary" (click)="exportarCSV()" [disabled]="exportando">
      @if (exportando) {
        {{ 'ANALYTICS.FILTERS.EXPORTING' | translate }}
      } @else {
        {{ 'ANALYTICS.FILTERS.EXPORT' | translate }}
      }
    </button>
  </div>

  <app-analytics-table [transactions]="transaccionesFiltradas"></app-analytics-table>
</section>

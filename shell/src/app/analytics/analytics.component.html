<section class="analytics">
  <div class="analytics-header">
    <div>
      <h1>{{ 'ANALYTICS.TITLE' | translate }}</h1>
      <p class="subtitle">
        @if (transactions()) {
          {{ numTransacciones() }} {{ 'ANALYTICS.SUBTITLE_SUFFIX' | translate }}
        } @else {
          {{ 'ANALYTICS.SUBTITLE_LOADING' | translate }}
        }
      </p>
    </div>
    <a routerLink="/" class="btn-link">
      <cap-button
        variant="capitalflow-outline"
        size="small"
        textStyle="none"
        [label]="'ANALYTICS.BTN_BACK' | translate" />
    </a>
  </div>

  @if (transactions()) {
    <app-analytics-stats
      [total]="numTransacciones()"
      [income]="totalIngresos()"
      [expenses]="totalGastos()">
    </app-analytics-stats>

    <div class="filtros">
      <div class="filtro-grupo">
        <label>{{ 'ANALYTICS.FILTERS.SEARCH' | translate }}</label>
        <input
          type="text"
          [ngModel]="filtroTexto()"
          (ngModelChange)="filtroTexto.set($event)"
          [placeholder]="'ANALYTICS.FILTERS.SEARCH_PLACEHOLDER' | translate"
          class="filtro-input"
        />
      </div>
      <div class="filtro-grupo">
        <label>{{ 'ANALYTICS.FILTERS.AMOUNT_MIN' | translate }}</label>
        <input
          type="number"
          [ngModel]="filtroImporteMin()"
          (ngModelChange)="filtroImporteMin.set($event)"
          placeholder="€ Min"
          class="filtro-input filtro-num"
        />
      </div>
      <div class="filtro-grupo">
        <label>{{ 'ANALYTICS.FILTERS.AMOUNT_MAX' | translate }}</label>
        <input
          type="number"
          [ngModel]="filtroImporteMax()"
          (ngModelChange)="filtroImporteMax.set($event)"
          placeholder="€ Max"
          class="filtro-input filtro-num"
        />
      </div>
      <cap-button
        variant="secondary"
        size="small"
        textStyle="none"
        [label]="'ANALYTICS.FILTERS.CLEAR' | translate"
        (capClick)="limpiarFiltros()" />
      <cap-button
        variant="primary"
        size="small"
        textStyle="none"
        [disabled]="exportando()"
        [loading]="exportando()"
        [label]="'ANALYTICS.FILTERS.EXPORT' | translate"
        [loadingText]="'ANALYTICS.FILTERS.EXPORTING' | translate"
        (capClick)="exportarCSV()" />
    </div>

    <app-analytics-table [transactions]="transaccionesFiltradas()"></app-analytics-table>
  } @else {
    <div class="loading-wrapper">
      <cap-spinner [label]="'ANALYTICS.LOADING_LABEL' | translate" />
    </div>
  }
</section>

<section class="wysiwyg">
  <h1>{{ i18n.PAGE_TITLE | translate }}</h1>
  <p class="wysiwyg__lead">{{ i18n.PAGE_LEAD | translate }}</p>

  <section class="wysiwyg__payload">
    <h2>{{ i18n.PAYLOAD_TITLE | translate }}</h2>
    <cap-button
      variant="capitalflow-outline"
      size="small"
      textStyle="none"
      [label]="i18n.INJECT_BUTTON | translate"
      (capClick)="injectTestPayload()">
    </cap-button>
  </section>

  <div class="wysiwyg__editor">
    <div #editorHost></div>
  </div>

  <cap-button
    variant="capitalflow-primary"
    size="small"
    textStyle="none"
    [label]="i18n.SAVE_BUTTON | translate"
    (capClick)="save()">
  </cap-button>

  @if (rawHtml()) {
    <div class="wysiwyg__output">
      <h2>{{ i18n.RAW_HEADING | translate }}</h2>
      <pre>{{ rawHtml() }}</pre>

      @if (hasInjectionAttempt()) {
        <cap-alert kind="warning" [message]="i18n.INJECTION_WARNING | translate"></cap-alert>
      }

      <h2>{{ i18n.SANITIZED_HEADING | translate }}</h2>
      <div class="wysiwyg__comparison">
        <cap-alert kind="danger" [message]="i18n.WITHOUT_MITIGATION | translate"></cap-alert>
        <cap-alert kind="success" [message]="i18n.WITH_MITIGATION | translate"></cap-alert>
      </div>
      <div class="wysiwyg__preview" [innerHTML]="sanitizedPreview()"></div>
    </div>
  }

  <footer class="wysiwyg__footer">
    <cap-button
      variant="capitalflow-outline"
      size="small"
      textStyle="none"
      [label]="backLabelPrefix + (i18n.BACK | translate)"
      (capClick)="goBack()">
    </cap-button>
  </footer>
</section>

<section class="admin-landing">
  <header class="admin-landing__header">
    <h1>{{ i18n.TITLE | translate }}</h1>
    <p class="admin-landing__lead">{{ i18n.LEAD | translate }}</p>
  </header>

  <div class="admin-landing__grid">
    <cap-info-card
      *ngFor="let demo of demos; trackBy: trackByRoute"
      [title]="demo.titleKey | translate"
      [description]="demo.descriptionKey | translate"
      [ctaLabel]="demo.ctaKey | translate"
      (ctaClick)="navigateToDemo(demo.route)">
    </cap-info-card>
  </div>
</section>

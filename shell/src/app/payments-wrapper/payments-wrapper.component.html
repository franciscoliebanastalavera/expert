<div #container class="mfe-container">
  @if (cargando()) {
    <div class="spinner-wrapper" [class.fade-out]="fadeOut()">
      <cap-spinner [label]="'MFE_PAYMENTS.LOADING' | translate" />
    </div>
  }
  @if (loadError()) {
    <cap-alert kind="danger" [message]="loadError() ?? ''">
      <cap-button
        variant="capitalflow-outline"
        size="small"
        textStyle="none"
        [label]="'MFE_PAYMENTS.RETRY' | translate"
        (capClick)="retryLoad()">
      </cap-button>
    </cap-alert>
  }
</div>

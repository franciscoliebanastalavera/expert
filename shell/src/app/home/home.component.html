<section class="home">
  <header class="home__hero">
    <h1 class="home__title">{{ 'HOME.SUMMARY.WELCOME_TITLE' | translate }}</h1>
    <p class="home__subtitle">{{ 'HOME.SUMMARY.WELCOME_SUBTITLE' | translate }}</p>
  </header>

  <div class="home__kpis">
    <cap-stat-card
      [label]="'HOME.SUMMARY.KPI.BALANCE' | translate"
      [value]="kpis.BALANCE"
      kind="positive">
    </cap-stat-card>
    <cap-stat-card
      [label]="'HOME.SUMMARY.KPI.INCOME' | translate"
      [value]="kpis.INCOME"
      kind="positive">
    </cap-stat-card>
    <cap-stat-card
      [label]="'HOME.SUMMARY.KPI.EXPENSES' | translate"
      [value]="kpis.EXPENSES"
      kind="neutral">
    </cap-stat-card>
    <cap-stat-card
      [label]="'HOME.SUMMARY.KPI.SAVINGS' | translate"
      [value]="kpis.SAVINGS"
      kind="positive">
    </cap-stat-card>
  </div>

  <div class="home__charts">
    <cap-trend-chart
      class="home__chart-trend"
      [title]="'HOME.SUMMARY.TREND.TITLE' | translate"
      [labels]="trendLabels"
      [series]="trendSeries()"
      [height]="chartHeightPx">
    </cap-trend-chart>

    <cap-donut-chart
      class="home__chart-donut"
      [title]="'HOME.SUMMARY.DONUT.TITLE' | translate"
      [data]="donutSegments()"
      [totalLabel]="'HOME.SUMMARY.DONUT.TOTAL_LABEL' | translate"
      [height]="chartHeightPx">
    </cap-donut-chart>
  </div>

  <section class="home__quick-access">
    <h2 class="home__section-title">{{ 'HOME.SUMMARY.QUICK_ACCESS.TITLE' | translate }}</h2>
    <div class="home__quick-grid">
      @for (card of quickAccessCards; track card.id) {
        <cap-info-card
          [title]="card.titleKey | translate"
          [description]="card.descriptionKey | translate"
          [ctaLabel]="'HOME.SUMMARY.QUICK_ACCESS.OPEN' | translate"
          (ctaClick)="navigateTo(card.route)">
        </cap-info-card>
      }
    </div>
  </section>
</section>

# Configuración de Nginx para aplicación SPA (Angular)
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Configuración de logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Redirigir todas las rutas a index.html para el enrutamiento del lado del cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para archivos estáticos (JS, CSS, imágenes)
    location ~* \.(?:css|js|map|jpe?g|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cachear el index.html para asegurar actualizaciones inmediatas
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Desactivar el acceso a archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

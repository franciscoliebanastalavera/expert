<div class="stats-bar">
  <cap-stat-card
    kind="neutral"
    [label]="text.STATS.TOTAL"
    [value]="total().toString()" />
  <cap-stat-card
    kind="positive"
    [label]="text.STATS.INCOME"
    [value]="formatAmount(income())" />
  <cap-stat-card
    kind="negative"
    [label]="text.STATS.EXPENSES"
    [value]="'-' + formatAmount(expenses())" />
  <cap-stat-card
    kind="neutral"
    [label]="text.STATS.DATASET_TOTAL"
    [value]="datasetTotal().toString()" />
  <cap-stat-card
    kind="neutral"
    [label]="text.STATS.FILTERED_ROWS"
    [value]="total().toString()" />
  <cap-stat-card
    kind="neutral"
    [label]="text.STATS.DOM_ROWS"
    [value]="domNodeCount().toString()" />
  <cap-stat-card
    kind="neutral"
    [label]="text.STATS.LAST_FILTER_MS"
    [value]="lastFilterMs().toFixed(2)" />
</div>

# GitLab CI/CD pipeline for CapitalFlow
# Module Federation microfrontend architecture

stages:
  - build
  - test
  - docker
  - deploy

variables:
  DOCKER_REGISTRY: "registry.capitalflow.local"
  DOCKER_DRIVER: overlay2
  NODE_VERSION: "20"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS == null && $CI_PIPELINE_SOURCE != "merge_request_event"'

.shared-ui-paths: &shared-ui-paths
  - shared-ui/**/*
  - shell/**/*
  - .gitlab-ci.yml

.shell-paths: &shell-paths
  - shell/**/*
  - shared-ui/**/*
  - .gitlab-ci.yml
  - docker-compose.yml

.mfe-analytics-paths: &mfe-analytics-paths
  - mfe-analytics-react/**/*
  - shared-ui/**/*
  - shell/**/*
  - .gitlab-ci.yml

.mfe-payments-paths: &mfe-payments-paths
  - mfe-payments/**/*
  - shared-ui/**/*
  - shell/**/*
  - .gitlab-ci.yml

.mfe-transactions-paths: &mfe-transactions-paths
  - mfe-transactions/**/*
  - shared-ui/**/*
  - shell/**/*
  - .gitlab-ci.yml

.rules-shared-ui: &rules-shared-ui
  - if: '$CI_COMMIT_BRANCH == "main"'
  - changes: *shared-ui-paths

.rules-shell: &rules-shell
  - if: '$CI_COMMIT_BRANCH == "main"'
  - changes: *shell-paths

.rules-mfe-analytics: &rules-mfe-analytics
  - if: '$CI_COMMIT_BRANCH == "main"'
  - changes: *mfe-analytics-paths

.rules-mfe-payments: &rules-mfe-payments
  - if: '$CI_COMMIT_BRANCH == "main"'
  - changes: *mfe-payments-paths

.rules-mfe-transactions: &rules-mfe-transactions
  - if: '$CI_COMMIT_BRANCH == "main"'
  - changes: *mfe-transactions-paths

.deploy-rules-shell: &deploy-rules-shell
  - if: '$CI_COMMIT_BRANCH == "main"'
    when: manual
  - changes: *shell-paths
    when: manual

.deploy-rules-mfe-analytics: &deploy-rules-mfe-analytics
  - if: '$CI_COMMIT_BRANCH == "main"'
    when: manual
  - changes: *mfe-analytics-paths
    when: manual

.deploy-rules-mfe-payments: &deploy-rules-mfe-payments
  - if: '$CI_COMMIT_BRANCH == "main"'
    when: manual
  - changes: *mfe-payments-paths
    when: manual

.deploy-rules-mfe-transactions: &deploy-rules-mfe-transactions
  - if: '$CI_COMMIT_BRANCH == "main"'
    when: manual
  - changes: *mfe-transactions-paths
    when: manual

.test_chrome_template:
  image: node:20-alpine
  before_script:
    - apk add --no-cache chromium nss freetype harfbuzz ttf-freefont
    - export CHROME_BIN=/usr/bin/chromium-browser

# ============================================================
# STAGE: BUILD
# ============================================================

build:shared-ui:
  stage: build
  image: node:20-alpine
  script:
    - cd shared-ui
    - npm install --legacy-peer-deps
    - npm run build
  artifacts:
    paths:
      - shared-ui/dist/
    expire_in: 1 hour
  rules: *rules-shared-ui

build:shell:
  stage: build
  image: node:20-alpine
  needs:
    - build:shared-ui
  script:
    - cd shell
    - npm install
    - npx ng build --configuration production
  artifacts:
    paths:
      - shell/dist/
    expire_in: 1 week
  rules: *rules-shell

build:mfe-analytics:
  stage: build
  image: node:20-alpine
  script:
    - cd mfe-analytics-react
    - npm install
    - npm run build
  artifacts:
    paths:
      - mfe-analytics-react/dist/
    expire_in: 1 week
  rules: *rules-mfe-analytics

build:mfe-payments:
  stage: build
  image: node:20-alpine
  needs:
    - build:shared-ui
  script:
    - cd mfe-payments
    - npm install
    - npx ng build --configuration production
  artifacts:
    paths:
      - mfe-payments/dist/
    expire_in: 1 week
  rules: *rules-mfe-payments

build:mfe-transactions:
  stage: build
  image: node:20-alpine
  needs:
    - build:shared-ui
  script:
    - cd mfe-transactions
    - npm install
    - npx ng build --configuration production
  artifacts:
    paths:
      - mfe-transactions/dist/
    expire_in: 1 week
  rules: *rules-mfe-transactions

# ============================================================
# STAGE: TESTS
# ============================================================

test:shared-ui:
  stage: test
  extends: .test_chrome_template
  script:
    - cd shared-ui
    - npm install --legacy-peer-deps
    - npm test
  rules: *rules-shared-ui

test:shell:
  stage: test
  extends: .test_chrome_template
  needs:
    - build:shared-ui
  script:
    - cd shell
    - npm install
    - npm test
  rules: *rules-shell

test:mfe-payments:
  stage: test
  extends: .test_chrome_template
  needs:
    - build:shared-ui
  script:
    - cd mfe-payments
    - npm install
    - npm test
  rules: *rules-mfe-payments

test:mfe-transactions:
  stage: test
  extends: .test_chrome_template
  needs:
    - build:shared-ui
  script:
    - cd mfe-transactions
    - npm install
    - npm test
  rules: *rules-mfe-transactions

test:mfe-analytics:
  stage: test
  image: node:20-alpine
  script:
    - cd mfe-analytics-react
    - npm install
    - npm test
  rules: *rules-mfe-analytics

# ============================================================
# STAGE: DOCKER IMAGE BUILD
# ============================================================

# === MOCK STAGE ===
# Intentionally a mock for the evaluation environment.
# Production would invoke docker build and push against the corporate registry.
docker:shell:
  stage: docker
  image: docker:latest
  allow_failure: true
  services:
    - docker:dind
  script:
    - echo "Docker build skipped in CI - no registry configured"
  needs:
    - build:shell
  rules: *rules-shell


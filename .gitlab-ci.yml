# === MOCK STAGE ===
# Intentionally a mock for the evaluation environment.
# Production would invoke kubectl/argocd/helm against the corporate cluster.
deploy:shell:
  stage: deploy
  image: alpine:latest
  allow_failure: true
  script:
    # Mock deployment: no real cluster is provisioned for this exam.
    # In production this step would invoke kubectl/helm/argocd against the target environment.
    - echo "Deploying shell version ${CI_COMMIT_SHORT_SHA}..."
    - echo "Shell deployed successfully"
  needs:
    - docker:shell
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - changes:
        - shell/**/*
        - shared-ui/**/*
      when: manual
  environment:
    name: production
    url: https://capitalflow.example.com


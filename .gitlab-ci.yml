# GitLab CI/CD pipeline for CapitalFlow
# Module Federation microfrontend architecture

stages:
  - build
  - test
  - docker
  - deploy

variables:
  DOCKER_REGISTRY: "registry.capitalflow.local"
  DOCKER_DRIVER: overlay2
  NODE_VERSION: "20"

.test_chrome_template:
  image: node:20-alpine
  before_script:
    - apk add --no-cache chromium nss freetype harfbuzz ttf-freefont
    - export CHROME_BIN=/usr/bin/chromium-browser

# ============================================================
# STAGE: BUILD
# ============================================================

build:shared-ui:
  stage: build
  image: node:20-alpine
  script:
    - cd shared-ui
    - npm install --legacy-peer-deps
    - npm run build
  artifacts:
    paths:
      - shared-ui/dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - changes:
        - shared-ui/**/*

build:shell:
  stage: build
  image: node:20-alpine
  needs:
    - build:shared-ui
  script:
    - cd shell
    - npm install
    - npx ng build --configuration production
  artifacts:
    paths:
      - shell/dist/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - changes:
        - shell/**/*
        - shared-ui/**/*

build:mfe-analytics:
  stage: build
  image: node:20-alpine
  script:
    - cd mfe-analytics-react
    - npm install
    - npm run build
  artifacts:
    paths:
      - mfe-analytics-react/dist/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - changes:
        - mfe-analytics-react/**/*

build:mfe-payments:
  stage: build
  image: node:20-alpine
  needs:
    - build:shared-ui
  script:
    - cd mfe-payments
    - npm install
    - npx ng build --configuration production
  artifacts:
    paths:
      - mfe-payments/dist/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - changes:
        - mfe-payments/**/*
        - shared-ui/**/*

build:mfe-transactions:
  stage: build
  image: node:20-alpine
  needs:
    - build:shared-ui
  script:
    - cd mfe-transactions
    - npm install
    - npx ng build --configuration production
  artifacts:
    paths:
      - mfe-transactions/dist/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - changes:
        - mfe-transactions/**/*
        - shared-ui/**/*

# ============================================================
# STAGE: TESTS
# ============================================================

test:shared-ui:
  stage: test
  extends: .test_chrome_template
  script:
    - cd shared-ui
    - npm install --legacy-peer-deps
    - npm test
  rules:

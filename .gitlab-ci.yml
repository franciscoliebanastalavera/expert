    - changes:
        - shared-ui/**/*

test:shell:
  stage: test
  extends: .test_chrome_template
  needs:
    - build:shared-ui
  script:
    - cd shell
    - npm install
    - npm test
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - changes:
        - shell/**/*
        - shared-ui/**/*

test:mfe-payments:
  stage: test
  extends: .test_chrome_template
  needs:

# Configuración de Nginx para microfrontend React con cabeceras CORS
# Las cabeceras CORS son necesarias para que Module Federation cargue remoteEntry.js
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Configuración de logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Redirigir todas las rutas a index.html con cabeceras CORS
    location / {
        # Cabeceras CORS para permitir la carga desde el shell
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";

        try_files $uri $uri/ /index.html;
    }

    # Configuración específica para remoteEntry.js de Module Federation
    location ~* remoteEntry\.js$ {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
        # No cachear remoteEntry.js para asegurar que siempre se cargue la última versión
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Caché para archivos estáticos (JS, CSS, imágenes)
    location ~* \.(?:css|map|jpe?g|png|gif|ico|svg|woff2?|ttf|eot)$ {
        add_header Access-Control-Allow-Origin *;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Archivos JS (excepto remoteEntry.js) con caché moderada
    location ~* \.js$ {
        add_header Access-Control-Allow-Origin *;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Desactivar el acceso a archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

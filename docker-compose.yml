# Docker Compose para el proyecto CapitalFlow
# Orquesta el shell principal, el microfrontend y la documentación Storybook

services:
  # Aplicación shell principal (Angular 18)
  shell:
    build:
      context: ./shell
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - mfe-analytics
    networks:
      - capitalflow-net
    restart: unless-stopped

  # Microfrontend de analíticas (React 18)
  mfe-analytics:
    build:
      context: ./mfe-analytics-react
      dockerfile: Dockerfile
    ports:
      - "8082:80"
    networks:
      - capitalflow-net
    restart: unless-stopped

  # Documentación de componentes (Storybook estático de shared-ui)
  storybook:
    build:
      context: ./shared-ui
      dockerfile: Dockerfile
    ports:
      - "6007:80"
    networks:
      - capitalflow-net
    restart: unless-stopped

# Red compartida entre todos los servicios
networks:
  capitalflow-net:
    driver: bridge
